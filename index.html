<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>INFLATION DODGE</title>
<meta name="description" content="Navigate your savings through a storm of inflation, fees, and financial traps. Survive as long as you can.">
<style>
  @font-face { font-family: 'Knapp'; src: url('fonts/Knapp-Light.otf') format('opentype'); font-weight: 300; font-display: swap; }
  @font-face { font-family: 'Knapp'; src: url('fonts/Knapp-Regular.otf') format('opentype'); font-weight: 400; font-display: swap; }
  @font-face { font-family: 'Knapp'; src: url('fonts/Knapp-Medium.otf') format('opentype'); font-weight: 500; font-display: swap; }
  @font-face { font-family: 'Mono'; src: url('fonts/PPNeueMontrealMono-Regular.otf') format('opentype'); font-weight: 400; font-display: swap; }
  @font-face { font-family: 'Mono'; src: url('fonts/PPNeueMontrealMono-Bold.otf') format('opentype'); font-weight: 700; font-display: swap; }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Knapp', sans-serif; -webkit-font-smoothing: antialiased; }
  canvas { display: block; }

  #start-screen {
    position: fixed; inset: 0; background: #000; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #fff; cursor: pointer; transition: opacity 0.5s;
  }
  #start-screen.hidden { opacity: 0; pointer-events: none; }
  .s-presents { font-family: 'Mono'; font-size: 10px; letter-spacing: 6px; text-transform: uppercase; color: #555; }
  .s-title { font-weight: 500; font-size: clamp(32px, 7vw, 56px); letter-spacing: 1px; text-transform: uppercase; text-align: center; line-height: 1.1; margin: 8px 0; }
  .s-sub { font-family: 'Knapp'; font-size: 14px; font-weight: 300; color: #666; margin-top: 4px; }
  .s-prompt { font-family: 'Mono'; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: #D4883A; margin-top: 28px; animation: breathe 4s ease-in-out infinite; }
  @keyframes breathe { 0%,100%{opacity:0.2} 50%{opacity:0.8} }

  #death-screen {
    display: none; position: fixed; inset: 0; z-index: 10;
    background: rgba(0,0,0,0.97); backdrop-filter: blur(10px);
    flex-direction: column; align-items: center; justify-content: center;
    color: #fff; padding: 24px; overflow-y: auto;
  }
  #death-screen.visible { display: flex; }
  .d-inner { display: flex; flex-direction: column; align-items: center; max-width: 400px; width: 100%; }
  .d-inner > * { opacity: 0; transform: translateY(8px); animation: fsi 0.5s ease-out forwards; }
  @keyframes fsi { to { opacity: 1; transform: translateY(0); } }
  .d-tag { font-family: 'Mono'; font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: #444; margin-bottom: 10px; }
  .d-big { font-size: clamp(36px, 9vw, 48px); font-weight: 300; line-height: 1; animation-delay: 0.08s; }
  .d-big em { font-style: normal; color: #ff4444; }
  .d-sub { font-size: 18px; font-weight: 300; color: #777; margin-top: 6px; animation-delay: 0.16s; }
  .d-sub em { font-style: normal; color: #ff4444; }
  .d-stats { font-family: 'Mono'; font-size: 11px; color: #333; margin-top: 16px; line-height: 2; text-align: left; animation-delay: 0.24s; }
  .d-stats span { color: #78FFB4; }
  .d-stats .red { color: #ff4444; }
  .d-editorial { font-size: 13px; font-weight: 400; color: #3a3a3a; margin-top: 16px; text-align: center; line-height: 1.6; max-width: 340px; animation-delay: 0.32s; }
  .d-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; justify-content: center; animation-delay: 0.4s; }
  .d-actions button {
    padding: 11px 26px; background: transparent; border: 1px solid #222;
    color: #666; font-family: 'Mono'; font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase; cursor: pointer; transition: all 0.25s; border-radius: 2px;
  }
  .d-actions button:hover { border-color: #555; color: #ccc; }
</style>
</head>
<body>

<div id="start-screen">
  <div class="s-presents">Legend presents</div>
  <div class="s-title">Inflation<br>Dodge</div>
  <div class="s-sub">Your savings. Your problem.</div>
  <div class="s-prompt">TAP OR CLICK TO START</div>
</div>

<canvas id="game"></canvas>

<div id="death-screen">
  <div class="d-inner">
    <div class="d-tag" id="d-tag">Game Over</div>
    <div class="d-big">Survived <em id="d-years">0</em> years</div>
    <div class="d-sub">Lost <em id="d-lost">$0</em> to inflation</div>
    <div class="d-stats" id="d-stats"></div>
    <div class="d-editorial" id="d-editorial">The average American loses ~40% of their purchasing power over 30 years. What if your money fought back?</div>
    <div class="d-actions">
      <button id="retry-btn">Try Again</button>
    </div>
  </div>
</div>

<script>
const C = document.getElementById('game');
const X = C.getContext('2d');
let W, H;
function resize() { W = C.width = window.innerWidth; H = C.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

// ======== AUDIO ENGINE ========
let ac, mg;
function initAudio() {
  if (ac) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();
  mg = ac.createGain(); mg.gain.value = 0.7; mg.connect(ac.destination);
}
// Legend logo image for canvas rendering
const legendLogo = new Image();
legendLogo.src = 'logo.svg';
let logoLoaded = false;
legendLogo.onload = () => { logoLoaded = true; };

function synth(type, freq, vol, dur, freqEnd, delay) {
  if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.value = freq; g.gain.value = vol;
  o.connect(g); g.connect(mg);
  const t = ac.currentTime + (delay || 0);
  o.start(t);
  if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, t + dur * 0.8);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.stop(t + dur + 0.05);
}
function playHitSound(pct) { synth('sawtooth', 100 + pct * 8, 0.3, 0.2, 50); }
function playGrazeSound() { synth('sine', 1400, 0.12, 0.08, 800); }
function playCollectSound(amt) { synth('sine', 500 + amt * 0.2, 0.2, 0.15, 500 + amt * 0.5); synth('sine', 700 + amt * 0.3, 0.1, 0.2, 1200 + amt * 0.4, 0.05); }
function playDeathSound() { synth('sawtooth', 200, 0.35, 1.2, 25); }
function playDrainTick() { if (!ac) return; const o = ac.createOscillator(), g = ac.createGain(); o.type = 'sine'; o.frequency.value = 220; g.gain.value = 0.02; o.connect(g); g.connect(mg); o.start(); g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.03); o.stop(ac.currentTime + 0.04); }

// ======== GAME STATE ========
const YEAR_DURATION = 13; // seconds per year
const INITIAL_BALANCE = 10000;

let player, balance, drainRate, drainAccel, distance, frameCount, gameState;
let years, peakBalance, totalLost, totalDrained;
let obstacles, particles, pickups;
let shakeAmount, flashAmount, hitShrink;
let comboCount, comboMultiplier, comboLabel;
let iFrames;
const pt = { x: 0, y: 0 };
let bestYears = parseFloat(localStorage.getItem('id_best') || '0');
let playerVX = 0, playerVY = 0, prevPX = 0, prevPY = 0;
let arenaEffects = [], announceText = '', announceTimer = 0;
let edgeWarnings = [];

const ARENA_EVENTS = [
  { at: 18, name: 'RECESSION', dur: 300, effect: 'recession' },
  { at: 31, name: 'RATE HIKE', dur: 360, effect: 'ratehike' },
  { at: 52, name: 'HOUSING CRISIS', dur: 300, effect: 'housing' },
  { at: 68, name: 'TAX SEASON', dur: 240, effect: 'tax' },
  { at: 85, name: 'BLACKOUT', dur: 180, effect: 'dark' },
  { at: 99, name: 'HYPERINFLATION', dur: 360, effect: 'hyper' },
];
let arenaTriggered = {};
let arenaRecession=false,arenaRateHike=false,arenaHousing=false,arenaTax=false,arenaDark=false,arenaHyper=false;
let ghostTrail = JSON.parse(localStorage.getItem('id_ghost') || '[]');
let currentTrail = [];

function initGame() {
  player = { x: W / 2, y: H * 0.7, radius: 18 };
  pt.x = player.x; pt.y = player.y;
  balance = INITIAL_BALANCE;
  drainRate = 2.0;
  drainAccel = 0;
  distance = 0;
  frameCount = 0;
  years = 0;
  peakBalance = INITIAL_BALANCE;
  totalLost = 0;
  totalDrained = 0;
  obstacles = [];
  particles = [];
  pickups = [];
  shakeAmount = 0;
  flashAmount = 0;
  hitShrink = 0;
  comboCount = 0;
  comboMultiplier = 1;
  comboLabel = '';
  iFrames = 0;
  currentTrail = [];
  playerVX = 0; playerVY = 0; prevPX = W / 2; prevPY = H * 0.7;
  arenaEffects = []; announceText = ''; announceTimer = 0; arenaTriggered = {};
  edgeWarnings = [];
  gameState = 'playing';
  initAudio();
}

// ======== INPUT ========
C.addEventListener('mousemove', e => { if (gameState === 'playing') { pt.x = e.clientX; pt.y = e.clientY; } });
C.addEventListener('touchmove', e => { e.preventDefault(); if (gameState === 'playing') { pt.x = e.touches[0].clientX; pt.y = e.touches[0].clientY; } }, { passive: false });
C.addEventListener('touchstart', e => { e.preventDefault(); if (gameState === 'playing') { pt.x = e.touches[0].clientX; pt.y = e.touches[0].clientY; } }, { passive: false });

document.getElementById('start-screen').addEventListener('click', () => {
  document.getElementById('start-screen').classList.add('hidden');
  setTimeout(() => document.getElementById('start-screen').style.display = 'none', 500);
  initGame();
});
document.getElementById('retry-btn').addEventListener('click', () => {
  document.getElementById('death-screen').classList.remove('visible');
  initGame();
});

// ======== OBSTACLES ========
const TIER1 = [
  { label: 'Groceries +3%', pct: 3, w: 150, h: 38, speed: 2.5, color: '#ee5544' },
  { label: 'Coffee +2%', pct: 2, w: 120, h: 34, speed: 3.0, color: '#cc6644' },
  { label: 'Gas +4%', pct: 4, w: 140, h: 38, speed: 2.2, color: '#dd4433' },
  { label: 'Subscriptions +1%', pct: 1, w: 160, h: 34, speed: 3.2, color: '#aa5555' },
];
const TIER2 = [
  { label: 'Rent +8%', pct: 8, w: 220, h: 44, speed: 1.8, color: '#ff3322' },
  { label: 'Insurance +6%', pct: 6, w: 170, h: 40, speed: 2.2, color: '#ee4433', diagonal: true },
  { label: 'Tuition +10%', pct: 10, w: 160, h: 40, speed: 2.0, color: '#ff2211', bounces: true },
  { label: 'Car Payment +5%', pct: 5, w: 160, h: 38, speed: 2.5, color: '#dd5544' },
  { label: 'RATE HIKE', pct: 0, w: 130, h: 36, speed: 4.0, color: '#ff0000', rateHike: true },
];

function spawnObstacle() {
  const yr = years;
  const pool = yr < 6 ? TIER1 : (Math.random() < 0.4 ? TIER1 : TIER2);
  const tmpl = pool[Math.floor(Math.random() * pool.length)];
  const fromSide = yr >= 8 && Math.random() < 0.15;
  const fromBottom = yr >= 15 && Math.random() < 0.08;

  let x, y, vx, vy;
  const scl = W < 500 ? 0.8 : 1;
  const w = tmpl.w * scl, h = tmpl.h;
  const spd = tmpl.speed * (1 + yr * 0.08);

  if (fromBottom) {
    x = Math.random() * (W - w); y = H + 10;
    vx = (Math.random() - 0.5) * 0.5; vy = -spd * 1.5;
  } else if (fromSide) {
    const left = Math.random() > 0.5;
    x = left ? -w - 5 : W + 5; y = 60 + Math.random() * (H * 0.6);
    vx = left ? spd * 1.2 : -spd * 1.2; vy = (Math.random() - 0.5) * 0.8;
  } else {
    x = Math.random() * (W - w); y = -h - 10;
    vx = tmpl.diagonal ? (Math.random() - 0.5) * spd * 0.8 : (Math.random() - 0.5) * 0.3;
    vy = spd * (1.2 + Math.random() * 0.4);
  }

  obstacles.push({
    x, y, w, h, vx, vy,
    label: tmpl.label, pct: tmpl.pct, color: tmpl.color,
    hit: false, grazed: false, bounces: tmpl.bounces || false, rateHike: tmpl.rateHike || false,
    harvestTrail: [], harvestTimer: 0,
  });
}

// ======== PICKUPS ========
function spawnPickup() {
  const yr = years;
  let type, amt, label, color, size;
  const r = Math.random();
  if (yr >= 5 && r < 0.2) {
    type = 'defi'; amt = 2000; label = 'DeFi Yield +$2,000'; color = '#FFD700'; size = 36;
  } else if (yr >= 10 && r < 0.04) {
    type = 'jackpot'; amt = 5000; label = 'JACKPOT +$5,000'; color = '#FFD700'; size = 44;
  } else {
    type = 'bank'; amt = 200; label = 'Bank Interest +$200'; color = '#78FFB4'; size = 26;
  }
  pickups.push({
    x: 20 + Math.random() * (W - 40), y: -size,
    size, amt, label, color, type,
    vy: 2.5 + Math.random() * 1.5,
    collected: false,
  });
}

// ======== PARTICLES ========
function spawnP(x, y, color, count, spread) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2, v = 1 + Math.random() * (spread || 4);
    particles.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v, life: 1, color, size: 1.5 + Math.random() * 2.5 });
  }
}

// ======== UPDATE ========
function update() {
  if (gameState !== 'playing') return;
  frameCount++;

  const gameSec = frameCount / 60;
  years = gameSec / YEAR_DURATION;
  const yr = years;

  // drain — brutal, accelerating fast
  drainRate = 10 + yr * 5 + Math.pow(yr, 1.7) * 0.3;
  const drainPerFrame = drainRate / 60;
  balance -= drainPerFrame;
  totalDrained += drainPerFrame;
  if (balance > peakBalance) peakBalance = balance;
  totalLost = INITIAL_BALANCE - balance + totalDrained;

  // drain tick sound (subtle, gets faster)
  if (frameCount % Math.max(8, Math.floor(40 - yr * 1.5)) === 0) playDrainTick();

  // movement — zero lag (slowed during RECESSION)
  const moveLerp = arenaRecession ? 0.10 : 0.18;
  player.x += (pt.x - player.x) * moveLerp;
  player.y += (pt.y - player.y) * moveLerp;
  player.x = Math.max(player.radius, Math.min(W - player.radius, player.x));
  player.y = Math.max(player.radius, Math.min(H - player.radius, player.y));

  // record trail for ghost
  if (frameCount % 6 === 0) currentTrail.push({ x: player.x, y: player.y, f: frameCount });

  // i-frames
  if (iFrames > 0) iFrames--;
  hitShrink *= 0.9;

  // spawn obstacles — relentless
  const spawnRate = Math.max(5, 18 - yr * 1.8);
  if (frameCount % Math.floor(spawnRate) === 0) spawnObstacle();

  // spawn pickups — much rarer
  const pickupRate = yr < 5 ? 480 : yr < 15 ? 600 : 900;
  if (frameCount % Math.floor(pickupRate) === 0) spawnPickup();

  // update obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const ob = obstacles[i];
    ob.x += ob.vx; ob.y += ob.vy;

    if (ob.bounces) {
      if (ob.x < 0 || ob.x + ob.w > W) ob.vx *= -1;
    }

    // off screen
    if (ob.y > H + 50 || ob.y < -100 || ob.x < -150 || ob.x > W + 150) {
      obstacles.splice(i, 1); continue;
    }

    if (ob.hit) continue;

    // collision
    const pr = player.radius * (1 - hitShrink * 0.3);
    const cx = Math.max(ob.x, Math.min(player.x, ob.x + ob.w));
    const cy = Math.max(ob.y, Math.min(player.y, ob.y + ob.h));
    const dx = player.x - cx, dy = player.y - cy;
    const distSq = dx * dx + dy * dy;

    // graze detection (8px)
    if (!ob.grazed && distSq < (pr + 8) * (pr + 8) && distSq > pr * pr) {
      ob.grazed = true;
      comboCount++;
      updateCombo();
      balance += 50 * comboMultiplier;
      spawnP(cx, cy, '#78FFB4', 4, 3);
      playGrazeSound();

      // harvest: slow obstacle, start yield trail
      ob.vx *= 0.4; ob.vy *= 0.4;
      ob.harvestTimer = 90;
    }

    // harvest trail generation
    if (ob.harvestTimer > 0) {
      ob.harvestTimer--;
      if (frameCount % 4 === 0) {
        ob.harvestTrail.push({ x: ob.x + ob.w / 2, y: ob.y + ob.h / 2, life: 1, value: 30 * comboMultiplier });
      }
    }

    // collision (actual hit)
    if (distSq < pr * pr && iFrames === 0) {
      ob.hit = true;
      let dmg;
      if (ob.rateHike) {
        dmg = 1200;
        drainRate *= 2.5;
      } else {
        dmg = Math.max(800, balance * (ob.pct / 100) * 1.5 + ob.pct * 100);
      }
      balance -= dmg;
      totalLost += dmg;

      // knockback
      const kd = Math.sqrt(distSq) || 1;
      player.x += (dx / kd) * 20;
      player.y += (dy / kd) * 20;

      iFrames = 12;
      hitShrink = 1;
      shakeAmount = 8;
      flashAmount = 1;
      comboCount = 0; comboMultiplier = 1; comboLabel = '';
      spawnP(player.x, player.y, ob.color, 15, 6);
      playHitSound(ob.pct);
    }
  }

  // player velocity tracking (for speed lines)
  playerVX = player.x - prevPX; playerVY = player.y - prevPY;
  prevPX = player.x; prevPY = player.y;

  // player pressure wave — push nearby obstacles away
  const PRESSURE_R = 50;
  for (const ob of obstacles) {
    if (ob.hit) continue;
    const ocx = ob.x + ob.w / 2, ocy = ob.y + ob.h / 2;
    const dx = ocx - player.x, dy = ocy - player.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < PRESSURE_R && dist > 0) {
      const force = (1 - dist / PRESSURE_R) * 0.6;
      ob.vx += (dx / dist) * force;
      ob.vy += (dy / dist) * force;
    }
  }

  // obstacle-obstacle collision physics (lightweight)
  for (let i = 0; i < obstacles.length; i++) {
    const a = obstacles[i]; if (a.hit) continue;
    for (let j = i + 1; j < obstacles.length; j++) {
      const b = obstacles[j]; if (b.hit) continue;
      const ax = a.x + a.w/2, ay = a.y + a.h/2, bx = b.x + b.w/2, by = b.y + b.h/2;
      const dx = bx - ax, dy = by - ay;
      const minD = (a.w + b.w) * 0.3;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < minD && dist > 0) {
        const push = (1 - dist/minD) * 0.3;
        a.vx -= (dx/dist) * push; a.vy -= (dy/dist) * push;
        b.vx += (dx/dist) * push; b.vy += (dy/dist) * push;
      }
    }
  }

  // arena effects
  if (announceTimer > 0) announceTimer--;
  const gs = frameCount / 60;
  for (const ae of ARENA_EVENTS) {
    if (!arenaTriggered[ae.at] && gs >= ae.at) {
      arenaTriggered[ae.at] = { start: frameCount + 150, end: frameCount + 150 + ae.dur };
      announceText = ae.name; announceTimer = 150;
    }
  }
  // active arena effects
  arenaRecession = false; arenaRateHike = false; arenaHousing = false; arenaTax = false; arenaDark = false; arenaHyper = false;
  for (const ae of ARENA_EVENTS) {
    const t = arenaTriggered[ae.at];
    if (t && frameCount >= t.start && frameCount < t.end) {
      if (ae.effect === 'recession') arenaRecession = true;
      if (ae.effect === 'ratehike') arenaRateHike = true;
      if (ae.effect === 'housing') arenaHousing = true;
      if (ae.effect === 'tax') arenaTax = true;
      if (ae.effect === 'dark') arenaDark = true;
      if (ae.effect === 'hyper') arenaHyper = true;
    }
  }

  // RECESSION: screen darkens, obstacles speed up 50%
  if (arenaRecession) {
    for (const ob of obstacles) { if (!ob.hit) { ob.vy *= 1.005; ob.vx *= 1.005; } }
  }
  // RATE HIKE: drain rate doubles
  if (arenaRateHike) drainRate *= 2;
  // HOUSING CRISIS: spawn extra-large obstacles
  if (arenaHousing && frameCount % 30 === 0) {
    const x = Math.random() * (W - 250); const vy = 1.5 + Math.random();
    obstacles.push({ x, y: -60, w: 250, h: 50, vx: (Math.random()-0.5)*0.3, vy, label: 'HOUSING +20%', pct: 20, color: '#ff2200', hit: false, grazed: false, bounces: false, rateHike: false, harvestTrail: [], harvestTimer: 0 });
  }
  // TAX SEASON: obstacles from ALL directions
  if (arenaTax && frameCount % 12 === 0) {
    const side = Math.floor(Math.random() * 4);
    const tmpl = TIER1[Math.floor(Math.random() * TIER1.length)];
    let x,y,vx,vy;
    if (side===0) { x=Math.random()*W; y=-40; vx=(Math.random()-0.5)*2; vy=3+Math.random()*2; }
    else if (side===1) { x=Math.random()*W; y=H+40; vx=(Math.random()-0.5)*2; vy=-(3+Math.random()*2); }
    else if (side===2) { x=-40; y=Math.random()*H; vx=3+Math.random()*2; vy=(Math.random()-0.5)*2; }
    else { x=W+40; y=Math.random()*H; vx=-(3+Math.random()*2); vy=(Math.random()-0.5)*2; }
    obstacles.push({ x, y, w: tmpl.w*0.8, h: tmpl.h, vx, vy, label: tmpl.label, pct: tmpl.pct, color: tmpl.color, hit: false, grazed: false, bounces: false, rateHike: false, harvestTrail: [], harvestTimer: 0 });
  }
  // HYPERINFLATION: everything speeds up + drain triples
  if (arenaHyper) {
    drainRate *= 3;
    for (const ob of obstacles) { if (!ob.hit) { ob.vy *= 1.008; ob.vx *= 1.008; } }
    shakeAmount = Math.max(shakeAmount, 2);
  }

  // edge warnings for incoming obstacles
  edgeWarnings = [];
  for (const ob of obstacles) {
    if (ob.hit) continue;
    if (ob.y < 0 && ob.y > -60) edgeWarnings.push({ x: ob.x + ob.w/2, y: 0, side: 'top' });
    if (ob.x < 0 && ob.x > -60) edgeWarnings.push({ x: 0, y: ob.y + ob.h/2, side: 'left' });
    if (ob.x + ob.w > W && ob.x < W + 60) edgeWarnings.push({ x: W, y: ob.y + ob.h/2, side: 'right' });
    if (ob.y + ob.h > H && ob.y < H + 60) edgeWarnings.push({ x: ob.x + ob.w/2, y: H, side: 'bottom' });
  }

  // update harvest trails
  for (const ob of obstacles) {
    for (let j = ob.harvestTrail.length - 1; j >= 0; j--) {
      const ht = ob.harvestTrail[j];
      ht.life -= 0.008;
      if (ht.life <= 0) { ob.harvestTrail.splice(j, 1); continue; }
      const dx = player.x - ht.x, dy = player.y - ht.y;
      if (dx * dx + dy * dy < 20 * 20) {
        balance += ht.value;
        comboCount++;
        updateCombo();
        spawnP(ht.x, ht.y, '#78FFB4', 3, 2);
        ob.harvestTrail.splice(j, 1);
      }
    }
  }

  // update pickups
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.y += p.vy;
    if (p.y > H + 50) { pickups.splice(i, 1); continue; }
    if (p.collected) continue;

    // magnetic pull (30px)
    const dx = player.x - p.x, dy = player.y - (p.y);
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 30 + p.size) {
      p.x += dx * 0.03;
      p.y += dy * 0.03;
    }

    // collect
    if (dist < player.radius + p.size * 0.6) {
      p.collected = true;
      const gain = p.amt * comboMultiplier;
      balance += gain;
      spawnP(p.x, p.y, p.color, 12, 5);
      playCollectSound(p.amt);
      pickups.splice(i, 1);
    }
  }

  // particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.life -= 0.025; p.vx *= 0.95; p.vy *= 0.95;
    return p.life > 0;
  });

  shakeAmount *= 0.82;
  flashAmount *= 0.85;

  // death
  if (balance <= 0) {
    balance = 0;
    gameState = 'dead';
    playDeathSound();
    // save ghost
    if (years > bestYears) {
      bestYears = years;
      localStorage.setItem('id_best', String(bestYears));
      ghostTrail = currentTrail;
      localStorage.setItem('id_ghost', JSON.stringify(ghostTrail.slice(0, 500)));
    }
    showDeath();
  }
}

function updateCombo() {
  if (comboCount >= 50) { comboMultiplier = 10; comboLabel = 'LEGEND'; }
  else if (comboCount >= 20) { comboMultiplier = 5; comboLabel = 'UNKILLABLE'; }
  else if (comboCount >= 10) { comboMultiplier = 3; comboLabel = 'DEGEN'; }
  else if (comboCount >= 5) { comboMultiplier = 2; comboLabel = 'RISK TAKER'; }
  else if (comboCount >= 3) { comboMultiplier = 1.5; comboLabel = 'CLOSE CALL'; }
  else { comboMultiplier = 1; comboLabel = ''; }
}

// ======== DRAW ========
function rr(x, y, w, h, r) {
  if (X.roundRect) { X.roundRect(x, y, w, h, r); return; }
  X.moveTo(x+r,y); X.lineTo(x+w-r,y); X.arcTo(x+w,y,x+w,y+r,r);
  X.lineTo(x+w,y+h-r); X.arcTo(x+w,y+h,x+w-r,y+h,r);
  X.lineTo(x+r,y+h); X.arcTo(x,y+h,x,y+h-r,r);
  X.lineTo(x,y+r); X.arcTo(x,y,x+r,y,r); X.closePath();
}

function draw() {
  if (!player) { X.fillStyle = '#000'; X.fillRect(0, 0, W, H); return; }
  X.save();
  if (shakeAmount > 0.5) X.translate((Math.random()-.5)*shakeAmount*2, (Math.random()-.5)*shakeAmount*2);

  // background — desaturate based on balance
  const healthPct = Math.max(0, balance / INITIAL_BALANCE);
  const bgR = Math.floor(0 + (1 - healthPct) * 8);
  const bgG = Math.floor(0);
  const bgB = Math.floor(0 + healthPct * 4);
  X.fillStyle = `rgb(${bgR},${bgG},${bgB})`;
  X.fillRect(0, 0, W, H);

  // grid (Legend blue, fades with health)
  const gridA = 0.015 + healthPct * 0.01;
  X.strokeStyle = `rgba(39,117,202,${gridA})`; X.lineWidth = 0.5;
  for (let x = 0; x < W; x += 40) { X.beginPath(); X.moveTo(x, 0); X.lineTo(x, H); X.stroke(); }
  for (let y = 0; y < H; y += 40) { X.beginPath(); X.moveTo(0, y); X.lineTo(W, y); X.stroke(); }

  // vignette (tightens as balance drops)
  const vigStr = 0.1 + (1 - healthPct) * 0.4;
  const vig = X.createRadialGradient(W/2, H/2, Math.min(W, H) * (0.35 - (1 - healthPct) * 0.1), W/2, H/2, Math.max(W, H) * 0.65);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, `rgba(0,0,0,${vigStr})`);
  X.fillStyle = vig; X.fillRect(0, 0, W, H);

  // arena: BLACKOUT — nearly blind
  if (arenaDark) {
    X.fillStyle = 'rgba(0,0,0,0.8)'; X.fillRect(0, 0, W, H);
    // only a small circle of visibility around player
    const vis = X.createRadialGradient(player.x, player.y, 30, player.x, player.y, 120);
    vis.addColorStop(0, 'rgba(0,0,0,0)'); vis.addColorStop(1, 'rgba(0,0,0,0.7)');
    X.fillStyle = vis; X.fillRect(0, 0, W, H);
  }
  // arena: RECESSION — everything goes blue/cold, screen desaturates heavily
  if (arenaRecession) {
    X.fillStyle = 'rgba(0,10,40,0.35)'; X.fillRect(0, 0, W, H);
    X.fillStyle = 'rgba(255,255,255,0.03)'; X.font = `bold ${W<500?20:40}px Mono, monospace`;
    X.textAlign = 'center'; X.textBaseline = 'middle';
    X.fillText('RECESSION', W/2, H/2);
  }
  // arena: RATE HIKE — pulsing red border, screen tinted red, impossible to miss
  if (arenaRateHike) {
    const rp = 0.5 + Math.sin(frameCount * 0.12) * 0.5;
    X.fillStyle = `rgba(255,0,0,${0.08 * rp})`; X.fillRect(0, 0, W, H);
    X.strokeStyle = `rgba(255,30,30,${0.5 * rp})`; X.lineWidth = 6;
    X.strokeRect(3, 3, W-6, H-6);
    X.fillStyle = `rgba(255,50,50,${0.03 * rp})`; X.font = `bold ${W<500?14:22}px Mono, monospace`;
    X.textAlign = 'center'; X.fillText('-$' + Math.floor(drainRate) + '/SEC', W/2, 80);
  }
  // arena: HOUSING CRISIS — dark red, screen feels oppressive
  if (arenaHousing) {
    X.fillStyle = 'rgba(60,0,0,0.3)'; X.fillRect(0, 0, W, H);
    // warning stripes at top
    for (let i = 0; i < W; i += 40) {
      X.fillStyle = `rgba(255,0,0,${0.04 + Math.sin(frameCount*0.05+i*0.1)*0.02})`;
      X.fillRect(i, 0, 20, 4);
    }
  }
  // arena: TAX SEASON — flashing red/orange border, screen pulses
  if (arenaTax) {
    const tp = 0.5 + Math.sin(frameCount * 0.2) * 0.5;
    X.fillStyle = `rgba(255,80,0,${0.12 * tp})`; X.fillRect(0, 0, W, H);
    X.strokeStyle = `rgba(255,120,0,${0.6 * tp})`; X.lineWidth = 4;
    X.strokeRect(2, 2, W-4, H-4);
  }
  // arena: HYPERINFLATION — deep red sky, everything vibrates, screen border on fire
  if (arenaHyper) {
    const hp = 0.5 + Math.sin(frameCount*0.1)*0.3;
    X.fillStyle = `rgba(120,0,0,${0.25 + hp*0.1})`; X.fillRect(0, 0, W, H);
    X.strokeStyle = `rgba(255,50,0,${0.4 + hp*0.3})`; X.lineWidth = 5;
    X.strokeRect(2, 2, W-4, H-4);
    // scanlines
    for (let y = (frameCount*3)%6; y < H; y += 6) {
      X.fillStyle = 'rgba(255,0,0,0.03)'; X.fillRect(0, y, W, 2);
    }
  }

  // hit flash
  if (flashAmount > 0.05) { X.fillStyle = `rgba(255,40,40,${flashAmount * 0.1})`; X.fillRect(0, 0, W, H); }

  // edge warnings
  for (const ew of edgeWarnings) {
    X.beginPath();
    if (ew.side === 'top') { X.moveTo(ew.x-6,0); X.lineTo(ew.x+6,0); X.lineTo(ew.x,8); }
    else if (ew.side === 'left') { X.moveTo(0,ew.y-6); X.lineTo(0,ew.y+6); X.lineTo(8,ew.y); }
    else if (ew.side === 'right') { X.moveTo(W,ew.y-6); X.lineTo(W,ew.y+6); X.lineTo(W-8,ew.y); }
    else { X.moveTo(ew.x-6,H); X.lineTo(ew.x+6,H); X.lineTo(ew.x,H-8); }
    X.closePath(); X.fillStyle = 'rgba(255,60,60,0.4)'; X.fill();
  }

  // announcement text
  if (announceTimer > 0) {
    const t = announceTimer / 150;
    const scale = t > 0.85 ? 1 + (1-t)/0.15*0.3 : 1;
    const alpha = t > 0.2 ? Math.min(1,(1-t)/0.15*0.5+0.4) : t/0.2;
    X.save(); X.translate(W/2,H/2); X.scale(scale,scale);
    X.fillStyle = `rgba(255,146,20,${alpha*0.5})`; X.font = `500 ${W<500?40:72}px Knapp, sans-serif`;
    X.textAlign = 'center'; X.textBaseline = 'middle'; X.fillText(announceText,0,0);
    X.restore();
  }

  // ghost trail
  if (ghostTrail.length > 1 && gameState === 'playing') {
    const ghostIdx = Math.floor(frameCount / 6);
    X.globalAlpha = 0.08;
    for (let i = Math.max(0, ghostIdx - 30); i < Math.min(ghostTrail.length, ghostIdx + 5); i++) {
      const g = ghostTrail[i];
      X.beginPath(); X.arc(g.x, g.y, 4, 0, Math.PI * 2);
      X.fillStyle = '#555'; X.fill();
    }
    X.globalAlpha = 1;
    if (ghostIdx >= ghostTrail.length && ghostTrail.length > 0) {
      X.fillStyle = 'rgba(120,255,180,0.15)'; X.font = 'bold 10px Mono, monospace';
      X.textAlign = 'center'; X.fillText('NEW PERSONAL BEST', W / 2, H - 40);
    }
  }

  // harvest trails
  for (const ob of obstacles) {
    for (const ht of ob.harvestTrail) {
      X.globalAlpha = ht.life * 0.6;
      X.beginPath(); X.arc(ht.x, ht.y, 3, 0, Math.PI * 2);
      X.fillStyle = '#78FFB4'; X.fill();
      X.globalAlpha = 1;
    }
  }

  // pickups
  pickups.forEach(p => {
    if (p.collected) return;
    const pulse = 1 + Math.sin(frameCount * 0.06) * 0.08;
    const isGold = p.type === 'defi' || p.type === 'jackpot';
    const isBank = p.type === 'bank';

    if (isBank) {
      // BANK INTEREST: deliberately ugly, boring gray card
      const bw = 80, bh = 32;
      X.globalAlpha = 0.6;
      X.fillStyle = '#1a1a1a';
      X.beginPath(); rr(p.x - bw/2, p.y - bh/2, bw, bh, 4); X.fill();
      X.strokeStyle = '#333'; X.lineWidth = 0.8;
      X.beginPath(); rr(p.x - bw/2, p.y - bh/2, bw, bh, 4); X.stroke();
      X.fillStyle = '#666'; X.font = '9px Mono, monospace'; X.textAlign = 'center'; X.textBaseline = 'middle';
      X.fillText('+$200', p.x, p.y - 4);
      X.fillStyle = '#444'; X.font = '7px Mono, monospace';
      X.fillText('0.4% APY', p.x, p.y + 8);
      X.globalAlpha = 1;
    } else {
      // DEFI / JACKPOT: Legend-branded premium card
      const cw = isGold && p.type === 'jackpot' ? 120 : 100;
      const ch = isGold && p.type === 'jackpot' ? 52 : 44;
      const cx = p.x - cw/2, cy = p.y - ch/2;

      // glow halo
      const ghR = cw * 0.6 * pulse;
      const glow = X.createRadialGradient(p.x, p.y, ghR * 0.3, p.x, p.y, ghR);
      glow.addColorStop(0, p.type === 'jackpot' ? 'rgba(255,200,0,0.15)' : 'rgba(39,117,202,0.12)');
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      X.fillStyle = glow; X.beginPath(); X.arc(p.x, p.y, ghR, 0, Math.PI*2); X.fill();

      // card background
      const cardGrd = X.createLinearGradient(cx, cy, cx, cy + ch);
      if (p.type === 'jackpot') {
        cardGrd.addColorStop(0, 'rgba(50,40,10,0.92)'); cardGrd.addColorStop(1, 'rgba(30,25,5,0.88)');
      } else {
        cardGrd.addColorStop(0, 'rgba(15,25,45,0.92)'); cardGrd.addColorStop(1, 'rgba(8,15,30,0.88)');
      }
      X.fillStyle = cardGrd;
      X.beginPath(); rr(cx, cy, cw, ch, 8); X.fill();

      // card border
      X.strokeStyle = p.type === 'jackpot' ? 'rgba(255,180,0,0.4)' : 'rgba(39,117,202,0.35)';
      X.lineWidth = 1.2;
      X.beginPath(); rr(cx, cy, cw, ch, 8); X.stroke();

      // Legend logo (top-left of card)
      if (logoLoaded) {
        X.globalAlpha = 0.6;
        X.drawImage(legendLogo, cx + 6, cy + 4, 40, 10);
        X.globalAlpha = 1;
      }

      // amount
      X.fillStyle = '#fff'; X.font = `bold ${W<500?14:16}px Knapp, sans-serif`;
      X.textAlign = 'center'; X.textBaseline = 'middle';
      X.fillText(p.type === 'jackpot' ? '+$5,000' : '+$2,000', p.x, p.y + 2);

      // rate label
      X.fillStyle = p.type === 'jackpot' ? 'rgba(255,200,0,0.6)' : 'rgba(39,117,202,0.6)';
      X.font = '8px Mono, monospace';
      X.fillText('7.2% APY', p.x, cy + ch - 6);
    }
  });

  // obstacles — solid, chunky, visually weighted
  obstacles.forEach(ob => {
    if (ob.hit) return;
    X.save();
    X.globalAlpha = ob.grazed ? 0.4 : 1;

    // color intensity based on severity
    const severity = Math.min(1, ob.pct / 20);
    const r = 180 + severity * 75, g = 60 - severity * 40, b = 30;

    // solid fill with gradient
    const obGrd = X.createLinearGradient(ob.x, ob.y, ob.x, ob.y + ob.h);
    obGrd.addColorStop(0, `rgba(${r},${g},${b},0.85)`);
    obGrd.addColorStop(1, `rgba(${r * 0.7},${g * 0.6},${b},0.75)`);
    X.fillStyle = obGrd;
    X.beginPath(); rr(ob.x, ob.y, ob.w, ob.h, 6); X.fill();

    // bright edge
    X.strokeStyle = `rgba(${Math.min(255,r+40)},${g+20},${b+10},0.5)`;
    X.lineWidth = 1.5;
    X.beginPath(); rr(ob.x, ob.y, ob.w, ob.h, 6); X.stroke();

    // inner glow at top
    const igrd = X.createLinearGradient(ob.x, ob.y, ob.x, ob.y + ob.h * 0.4);
    igrd.addColorStop(0, 'rgba(255,255,255,0.08)');
    igrd.addColorStop(1, 'rgba(255,255,255,0)');
    X.fillStyle = igrd;
    X.beginPath(); rr(ob.x + 1, ob.y + 1, ob.w - 2, ob.h * 0.4, 5); X.fill();

    // percentage badge (left side)
    const badgeW = 32, badgeH = ob.h - 8;
    X.fillStyle = 'rgba(0,0,0,0.3)';
    X.beginPath(); rr(ob.x + 4, ob.y + 4, badgeW, badgeH, 4); X.fill();
    X.fillStyle = '#fff'; X.font = `bold ${W < 500 ? 10 : 12}px Mono, monospace`;
    X.textAlign = 'center'; X.textBaseline = 'middle';
    X.fillText(ob.rateHike ? '!!' : '+' + ob.pct + '%', ob.x + 4 + badgeW / 2, ob.y + ob.h / 2);

    // label text (right of badge)
    X.fillStyle = 'rgba(255,255,255,0.9)'; X.font = `500 ${W < 500 ? 11 : 13}px Knapp, sans-serif`;
    X.textAlign = 'left';
    const labelName = ob.label.replace(/\s*\+\d+%/, '').replace('RATE HIKE', 'RATE HIKE');
    X.fillText(labelName, ob.x + badgeW + 10, ob.y + ob.h / 2 + 1);

    X.restore();
  });

  // speed lines behind player
  const spd = Math.sqrt(playerVX*playerVX + playerVY*playerVY);
  if (spd > 2) {
    const lineCount = Math.min(6, Math.floor(spd / 1.5));
    for (let i = 0; i < lineCount; i++) {
      const len = 8 + spd * 2 + Math.random() * 10;
      const ox = player.x - playerVX * (2 + i * 1.5) + (Math.random()-0.5) * 12;
      const oy = player.y - playerVY * (2 + i * 1.5) + (Math.random()-0.5) * 12;
      X.beginPath(); X.moveTo(ox, oy);
      X.lineTo(ox - playerVX * len * 0.15, oy - playerVY * len * 0.15);
      X.strokeStyle = `rgba(120,255,180,${0.08 + spd * 0.01})`; X.lineWidth = 1; X.stroke();
    }
  }

  // pressure wave ring around player
  X.beginPath(); X.arc(player.x, player.y, 50, 0, Math.PI * 2);
  X.strokeStyle = `rgba(120,255,180,${0.03 + spd * 0.003})`; X.lineWidth = 0.5; X.stroke();

  // player
  const pr = player.radius * (1 - hitShrink * 0.3);
  const coinHealth = Math.max(0, Math.min(1, balance / INITIAL_BALANCE));

  // outer glow
  const glowR = 40 + comboCount * 2;
  const og = X.createRadialGradient(player.x, player.y, 0, player.x, player.y, glowR);
  og.addColorStop(0, `rgba(120,255,180,${0.08 + comboCount * 0.005})`);
  og.addColorStop(1, 'rgba(120,255,180,0)');
  X.fillStyle = og; X.beginPath(); X.arc(player.x, player.y, glowR, 0, Math.PI * 2); X.fill();

  // USDC-style coin body — premium Legend look
  X.beginPath(); X.arc(player.x, player.y, pr, 0, Math.PI * 2);
  const coinGrd = X.createRadialGradient(player.x - 2, player.y - 2, 0, player.x, player.y, pr);
  if (coinHealth > 0.3) {
    coinGrd.addColorStop(0, `rgba(100,200,255,${0.6 + coinHealth * 0.4})`);
    coinGrd.addColorStop(1, `rgba(39,117,202,${0.5 + coinHealth * 0.5})`);
  } else {
    coinGrd.addColorStop(0, `rgba(120,60,60,${0.4 + coinHealth})`);
    coinGrd.addColorStop(1, `rgba(80,30,30,${0.3 + coinHealth})`);
  }
  X.fillStyle = coinGrd;
  if (iFrames > 0 && Math.floor(frameCount / 3) % 2 === 0) X.fillStyle = 'rgba(255,255,255,0.3)';
  X.fill();

  // outer ring (coin edge)
  X.beginPath(); X.arc(player.x, player.y, pr + 2.5, 0, Math.PI * 2);
  X.strokeStyle = coinHealth > 0.3 ? `rgba(100,180,255,${0.25 + comboCount * 0.015})` : 'rgba(255,60,60,0.3)';
  X.lineWidth = 1.2; X.stroke();
  // inner ring detail
  X.beginPath(); X.arc(player.x, player.y, pr - 3, 0, Math.PI * 2);
  X.strokeStyle = coinHealth > 0.3 ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.03)';
  X.lineWidth = 0.5; X.stroke();

  // $ symbol
  X.fillStyle = coinHealth > 0.3 ? '#fff' : '#aaa';
  X.font = `bold ${Math.round(pr * 0.75)}px Mono, monospace`;
  X.textAlign = 'center'; X.textBaseline = 'middle';
  X.fillText('$', player.x, player.y + 0.5);

  // particles
  particles.forEach(p => {
    X.globalAlpha = p.life; X.fillStyle = p.color;
    X.beginPath(); X.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); X.fill();
    X.globalAlpha = 1;
  });

  // ======== HUD ========
  if (gameState === 'playing' || gameState === 'dead') {
    // balance + drain rate — larger, premium
    const drainColor = drainRate < 15 ? '#78FFB4' : drainRate < 30 ? '#FFD666' : '#ff4444';
    X.fillStyle = '#555'; X.font = '10px Mono, monospace'; X.textAlign = 'left';
    X.fillText('BALANCE', 20, 26);
    X.fillStyle = drainColor; X.font = 'bold 26px Mono, monospace';
    X.fillText('$' + Math.max(0, balance).toFixed(0), 20, 52);
    X.fillStyle = drainColor + '88'; X.font = '11px Mono, monospace';
    X.fillText('-$' + drainRate.toFixed(1) + '/s', 20, 68);

    // year — large
    X.fillStyle = '#555'; X.font = '10px Mono, monospace'; X.textAlign = 'right';
    X.fillText('YEAR', W - 20, 26);
    X.fillStyle = '#fff'; X.font = 'bold 26px Mono, monospace';
    X.fillText(Math.floor(years).toString(), W - 20, 52);

    // Legend wordmark centered at top
    if (logoLoaded) {
      const lw = 130, lh = lw * (28/160);
      X.globalAlpha = 0.4;
      X.drawImage(legendLogo, W/2 - lw/2, 8, lw, lh);
      X.globalAlpha = 1;
    }

    // combo — bigger, more visible
    if (comboCount >= 3) {
      X.fillStyle = '#2775CA'; X.font = 'bold 14px Mono, monospace'; X.textAlign = 'center';
      X.fillText(`${comboMultiplier}x ${comboLabel}`, W / 2, 30);
      X.fillStyle = 'rgba(39,117,202,0.4)'; X.font = '10px Mono, monospace';
      X.fillText(`COMBO ${comboCount}`, W / 2, 46);
    }

    // purchasing power bar — thicker
    const barW = W - 40, barH = 5, barX = 20, barY = H - 20;
    X.fillStyle = '#111'; X.fillRect(barX, barY, barW, barH);
    const barPct = Math.max(0, balance / INITIAL_BALANCE);
    const barColor = barPct > 0.5 ? '#2775CA' : barPct > 0.2 ? '#FFD666' : '#ff4444';
    X.fillStyle = barColor; X.fillRect(barX, barY, barW * barPct, barH);
    X.fillStyle = '#444'; X.font = '8px Mono, monospace'; X.textAlign = 'left';
    X.fillText('PURCHASING POWER', barX, barY - 6);
    X.textAlign = 'right'; X.fillStyle = '#333';
    X.fillText('POWERED BY LEGEND', barX + barW, barY - 6);
  }

  X.restore();
}

// ======== DEATH SCREEN ========
function showDeath() {
  document.getElementById('d-years').textContent = Math.floor(years);
  document.getElementById('d-lost').textContent = '$' + Math.floor(totalDrained + totalLost).toLocaleString();

  const stats = document.getElementById('d-stats');
  stats.innerHTML = [
    `Peak balance: <span>$${Math.floor(peakBalance).toLocaleString()}</span>`,
    `Best combo: <span>${comboCount > 0 ? comboCount + 'x' : 'none'}</span>`,
    `Drain rate at death: <span class="red">-$${drainRate.toFixed(2)}/s</span>`,
  ].join('<br>');

  document.querySelectorAll('.d-inner > *').forEach((el, i) => {
    el.style.animation = 'none'; el.offsetHeight;
    el.style.animation = `fsi 0.5s ease-out ${i * 0.08}s forwards`;
  });
  setTimeout(() => document.getElementById('death-screen').classList.add('visible'), 500);
}

// ======== LOOP ========
function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
